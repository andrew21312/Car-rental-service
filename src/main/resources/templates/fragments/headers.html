<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title}"></title>
    <!-- See configuration in WebMvcConfig.java -->

    <!-- jQuery    -->
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <!-- Popper    -->
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <!-- Bootstrap    -->
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" media="screen"/>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.4.3/dist/js/tom-select.complete.min.js"></script>


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

    <!-- Flatpickr  -->
    <link th:href="@{/webjars/flatpickr/4.6.13/dist/themes/dark.css}" rel="stylesheet">
    <script th:src="@{/webjars/flatpickr/4.6.13/dist/flatpickr.min.js}"></script>

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="/app.css" rel="stylesheet" media="screen"/>
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // Отримати повідомлення про помилку з сервера
            var errorMessage = [[${errorMessage}]];
            if (errorMessage) {
                Swal.fire({
                    title: 'Error',
                    text: errorMessage,
                    icon: 'error',
                    confirmButtonText: 'ОК',
                    background: '#2e2a3a',   // Темний фон
                    color: '#fff',           // Світлий текст
                });
            }
            // Отримати повідомлення про помилку з сервера
            var successMessage = [[${successMessage}]];
            if (successMessage) {
                Swal.fire({
                    title: 'Success',
                    text: successMessage,
                    icon: 'success',
                    confirmButtonText: 'ОК',
                    background: '#2e2a3a',   // Темний фон
                    color: '#fff',           // Світлий текст
                });
            }
        });

        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll('.tom-select').forEach(function (el) {
                new TomSelect(el, {
                    sortField: 'text',
                    placeholder: 'Select option',
                    create: false
                });
            });
        });

        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll('.delete-form').forEach(function (form) {
                form.addEventListener('submit', function (e) {
                    e.preventDefault(); // Забороняємо стандартну відправку форми
                    const message = form.dataset.confirm; // Отримуємо текст повідомлення з data-атрибуту
                    Swal.fire({
                        text: message,
                        icon: 'warning',
                        background: '#2e2a3a',   // Темний фон
                        color: '#fff',           // Світлий текст
                        showCancelButton: true,
                        confirmButtonText: 'Delete',
                        cancelButtonText: 'Cancel',
                    }).then((result) => {
                        if (result.isConfirmed) {
                            form.submit(); // Якщо користувач підтвердив, відправляємо форму
                        }
                    });
                });
            });
        });
    </script>
</head>
<body>
</body>
</html>
