<!-- UNIVERSAL FORM FIELD CONTAINER (замість form-Field і form-Field-col-6) -->
<th:block th:fragment="form-Field-generic(fieldName, label, class)">
    <div class="form-group form-floating mb-3" th:classappend="${class}">
        <div th:replace="~{fragments/formField :: formField(${fieldName}, ${label})}"></div>
    </div>
</th:block>

<!-- INPUT FIELD (formField) -->
<th:block th:fragment="formField(fieldName, label)">
    <input class="form-control"
           required
           th:classappend="${#fields.hasErrors(fieldName)} ? ' is-invalid' : ''"
           th:field="*{__${fieldName}__}"
           th:placeholder="${'Enter ' + #strings.toLowerCase(label)}"
           type="text"/>
    <label class="mx-1" th:for="${fieldName}" th:text="${label}">Label</label>
    <div class="invalid-feedback" th:errors="*{__${fieldName}__}"
         th:if="${#fields.hasErrors(fieldName)}"></div>
</th:block>

<!-- DATE FIELD WITH CLEAR BUTTON -->
<th:block th:fragment="form-Field-date(fieldName, label)">
    <div class="mb-3 col-12">
        <label th:for="${fieldName}" th:text="${label}"></label>
        <div class="input-group">
            <input class="form-control"
                   required
                   th:classappend="${#fields.hasErrors(fieldName)} ? ' is-invalid' : ''"
                   th:field="*{__${fieldName}__}"
                   th:id="${fieldName}" type="text"/>
            <button class="btn btn-outline-secondary clear-date-button"
                    th:attr="data-fieldname=${fieldName}" type="button">
                Clear
            </button>
        </div>
        <div class="invalid-feedback" th:errors="*{__${fieldName}__}"
             th:if="${#fields.hasErrors(fieldName)}"></div>
    </div>
</th:block>

<!-- Фрагмент: form-select-primitive (список для вибору, примітивні значення) -->
<th:block th:fragment="form-select-primitive (fieldName, label, items, class)">
    <div class="form-floating mb-3" th:classappend="${class}">
        <select class="form-select tom-select"
                required
                th:classappend="${#fields.hasErrors(fieldName)} ? ' is-invalid' : ''"
                th:id="${fieldName}"
                th:name="${fieldName}">
            <option value="">Select option</option>
            <option th:each="item : ${__${items}__}"
                    th:selected="${item} == (*{__${fieldName}__} != null ? *{__${fieldName}__} : null)"
                    th:text="${item}"
                    th:value="${item}">
            </option>
        </select>
        <label class="mx-1" th:for="${fieldName}" th:text="${label}">Label</label>
        <div class="invalid-feedback d-block"
             th:errors="*{__${fieldName}__}"
             th:if="${#fields.hasErrors(fieldName)}">
        </div>
    </div>
</th:block>

<!-- Фрагмент: form-select-object (список для вибору обʼєктів) -->
<th:block th:fragment="form-select-object (fieldName, label, items, displayName, class)">
    <div class="form-floating mb-3" th:classappend="${class}">
        <select class="form-select tom-select"
                required
                th:classappend="${#fields.hasErrors(fieldName)} ? ' is-invalid' : ''"
                th:id="${fieldName}"
                th:name="${fieldName}">
            <option value="">Select option</option>
            <option th:each="item : ${__${items}__}"
                    th:selected="${item.id} == (*{__${fieldName}__} != null ? *{__${fieldName}__.id} : null)"
                    th:text="${item[displayName]}"
                    th:value="${item.id}">
            </option>
        </select>
        <label class="mx-1" th:for="${fieldName}" th:text="${label}">Label</label>
        <div class="invalid-feedback d-block"
             th:errors="*{__${fieldName}__}"
             th:if="${#fields.hasErrors(fieldName)}">
        </div>
    </div>
</th:block>

<!-- DELETE BUTTON -->
<th:block th:fragment="delete-btn(thAction, entityName, entityInfo, class)">
    <form class="action-btn delete-form" th:action="${thAction}"
          th:attr="data-confirm='Are you sure you want to delete this ' + ${entityName} + '?'"
          th:classappend="${class}"
          th:method="post">
        <input name="id" th:value="${__${entityInfo}__.id}" type="hidden"/>
        <button class="btn btn-danger btn-sm" th:classappend="${class}"
                type="submit"><i class="bi bi-x-circle me-1"></i>Delete
        </button>
    </form>
</th:block>

<!-- ACTION BUTTON (універсальна кнопка) -->
<th:block th:fragment="action-btn(thAction, entityInfo, btnText)">
    <form class="action-btn" th:action="${thAction}" th:method="GET">
        <input name="id" th:value="${__${entityInfo}__.id}" type="hidden"/>
        <button class="btn btn-primary" th:text="${btnText}" type="submit">btnText</button>
    </form>
</th:block>
